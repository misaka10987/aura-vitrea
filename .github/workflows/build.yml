name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run build script
        run: ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: dist.tar.zst
          path: dist.tar.zst
